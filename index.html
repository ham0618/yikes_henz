<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Verify</title>

  <!-- Noto Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Noto Sans', sans-serif;
      text-align: center;
      margin-top: 80px;
      background: #111;
      color: #fff;
      padding: 20px;
    }

    p {
      font-size: 30px;
      margin-top: 20px;
    }

    input {
      padding: 20px;
      margin-top: 15px;
      font-size: 35px;
      width: 80%;
      max-width: 300px;
    }

    button {
      padding: 14px 24px;
      margin-top: 35px;
      font-size: 40px;
      cursor: pointer;
    }

    #verify-box {
      transition: all 0.3s ease;
    }

    #content {
      display: none;
      margin-top: 40px;
      font-size: 20px;
      transition: all 0.3s ease;
    }

    .guest-link {
      display: inline-block;
      margin-top: 30px;
      font-size: 35px;
      color: #fff;
      text-decoration: none;
      padding: 15px 25px;
      background: #ff4d6d;
      border-radius: 12px;
    }

    .guest-link:hover {
      background: #ff2e55;
    }
  </style>
</head>

<body>

  <!-- 인증 영역 -->
  <div id="verify-box">
    <img src="yikes_img.png" style="max-width: 100%; height: auto;" alt="captcha">
    <p>Type the word: <b>yikes</b></p>

    <input type="text" id="answer" placeholder="입력">
    <br>
    <button onclick="check()">Verify</button>
  </div>

  <!-- 통과 후 -->
  <div id="content">
    <p>
    봄의 해방, 이태원의 소년들이 헨즈로.<br>
    함께 하시겠어요?
  </p>

  <p>
    Spring, Liberation, and henz.<br>
    join our journey?
  </p>

  <p>
    [Live: Yikes, lov3rboi, Tentai]<br>
    [Dj: Fulltime, Pullupboi, Hegotsound Jan7th, Musubi, Noozy]
  </p>

    <a href="https://docs.google.com/forms/d/e/1FAIpQLSfe6kKBgNWpGj5hEaFOc5QJQe-Hsr_SrL3iHGl5ZZtj6YE6Eg/viewform" target="_blank" class="guest-link">
      guset ticket
    </a>
  </div>

  <script>
    function check() {
      const input = document.getElementById("answer").value;

      if (input.toLowerCase() === "yikes") {
        document.getElementById("verify-box").style.display = "none";
        document.getElementById("content").style.display = "block";
      } else {
        alert("Try again");
      }
    }
  </script>

</body>
</html>
