<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Verify</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 100px;
      background: #111;
      color: #fff;
    }
    input {
      padding: 10px;
      margin-top: 10px;
    }
    button {
      padding: 10px 20px;
      margin-top: 10px;
      cursor: pointer;
    }
    #content {
      display: none;
      margin-top: 40px;
    }
  </style>
</head>
<body>

  <h2>CAPTCHA</h2>
  <p>Type the word: <b>yikes</b></p>

  <input type="text" id="answer" placeholder="입력">
  <br>
  <button onclick="check()">Verify</button>

  <!-- 통과 후 보여줄 영역 -->
  <div id="content">
    <h2 입장 완료</h2>
    <p>파티 홍보문 넣기</p>
    <a href="https://your-link.com" target="_blank">게스트 링크</a>
  </div>

  <script>
    function check() {
      const input = document.getElementById("answer").value;

      if (input.toLowerCase() === "yikes") {
        document.getElementById("content").style.display = "block";
      } else {
        alert("틀림");
      }
    }
  </script>

</body>
</html>
